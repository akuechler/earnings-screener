name: Earnings Momentum Screener

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Screener ausführen
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          python screener.py

      - name: Ergebnisse als Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: earnings-momentum-screen
          path: |
            data/earnings_momentum_screen.csv
            data/earnings_momentum_all.csv
